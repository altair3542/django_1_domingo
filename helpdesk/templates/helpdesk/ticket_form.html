{% extends "base.html" %}
{% block title %}Ticket{% endblock %}
{% block content %}
  <h1>Ticket</h1>

  {% if user.is_staff %}
    <p><small>Como staff puedes gestionar estados operativos, pero el cierre debe hacerse desde la acción dedicada.</small></p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'ticket_list' %}">Volver</a>
  </form>
{% endblock %}
